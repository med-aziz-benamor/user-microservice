server:
  port: 8081

spring:
  application:
    name: user-service

  # ── Base de données PostgreSQL ──
  datasource:
    url: jdbc:postgresql://localhost:5432/userdb
    username: postgres
    password: devpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway gère le schéma, pas Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway — migrations SQL automatiques ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis — cache ──
  data:
    redis:
      host: localhost
      port: 6379
      password: devpassword

  # ── Kafka ──
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: user-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.userservice.kafka"

  # ── Keycloak JWT ──
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/myapp-realm/protocol/openid-connect/certs

# ── Config Keycloak Admin Client ──
keycloak:
  server-url: http://localhost:8080
  realm: myapp-realm
  client-id: user-service
  client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme}

# ── Actuator (health check) ──
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── Swagger UI ──
springdoc:
  swagger-ui:
    path: /swagger-ui.html
